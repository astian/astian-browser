name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        node-version: [22]

    steps:
      - name: Checkout code
        id: checkout_primary
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Retry checkout after transient GitHub failure
        if: steps.checkout_primary.outcome == 'failure'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify repository checkout
        run: git rev-parse HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint code
        run: bun run lint

      - name: Type check (Node)
        run: bun run typecheck:node

      - name: Type check (Web)
        run: bun run typecheck:web

      - name: Run tests
        run: bun run test

      - name: Build application
        run: bun run build
        env:
          CI: true
