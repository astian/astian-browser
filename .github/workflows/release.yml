name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
            platform: linux
          - os: windows-latest
            node-version: 22
            platform: win
          - os: macos-14
            node-version: 22
            platform: mac

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Build and package (Linux)
        if: matrix.platform == 'linux'
        run: bun run build:linux
        env:
          CI: true

      - name: Build and package (Windows)
        if: matrix.platform == 'win'
        run: bun run build:win
        env:
          CI: true
          # Windows signing (optional - stub for now)
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build and package (macOS)
        if: matrix.platform == 'mac'
        run: bun run build:mac
        env:
          CI: true
          # macOS notarization (optional - stub for now)
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astian-${{ matrix.platform }}-${{ github.sha }}
          path: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/latest*.yml
          if-no-files-found: warn

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/latest*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update latest.yml (Linux)
        if: matrix.platform == 'linux' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-artifacts
          cp dist/latest-linux.yml release-artifacts/latest-linux.yml
        continue-on-error: true

      - name: Create or update latest.yml (macOS)
        if: matrix.platform == 'mac' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-artifacts
          cp dist/latest-mac.yml release-artifacts/latest-mac.yml
        continue-on-error: true

      - name: Create or update latest.yml (Windows)
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-artifacts
          copy dist/latest.yml release-artifacts/latest.yml
        shell: cmd
        continue-on-error: true
